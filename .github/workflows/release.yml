name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v2
      - name: Test
        run: cargo test --release
      - name: Make App
        run: make dmg
      - name: Upload Application
        run: |
          mv ./target/release/osx/Zterm.dmg ./Zterm-${GITHUB_REF##*/}.dmg
          ./.github/workflows/upload_asset.sh ./Zterm-${GITHUB_REF##*/}.dmg $GITHUB_TOKEN

  windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v2
      - name: Test
        run: cargo test --release
      - name: Build
        run: cargo build --release
      - name: Upload portable executable
        run: |
          cp ./target/release/zterm.exe ./Zterm-${GITHUB_REF##*/}-portable.exe
          ./.github/workflows/upload_asset.sh \
            ./Zterm-${GITHUB_REF##*/}-portable.exe $GITHUB_TOKEN
      - name: Install WiX
        run: nuget install WiX
      - name: Crate msi installer
        run: |
          ./WiX.*/tools/candle.exe -nologo -arch "x64" -ext WixUIExtension -ext WixUtilExtension \
            -out "./zterm.wixobj" "extra/windows/wix/zterm.wxs"
          ./WiX.*/tools/light.exe -nologo -ext WixUIExtension -ext WixUtilExtension \
            -out "./Zterm-${GITHUB_REF##*/}-installer.msi" -sice:ICE61 -sice:ICE91 \
            "./zterm.wixobj"
      - name: Upload msi installer
        run: |
          ./.github/workflows/upload_asset.sh \
            ./Zterm-${GITHUB_REF##*/}-installer.msi $GITHUB_TOKEN

  linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Install dependencies
        run: |
          sudo apt-get install cmake pkg-config libfreetype6-dev libfontconfig1-dev \
            libxcb-xfixes0-dev libxkbcommon-dev python3
      - name: Test
        run: cargo test --release
      - name: Gzip manpage
        run: gzip -c "./extra/zterm.man" > "./zterm.1.gz"
      - name: Upload Assets
        run: |
          mv ./extra/logo/zterm-term.svg ./Zterm.svg
          ./.github/workflows/upload_asset.sh ./Zterm.svg $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./zterm.1.gz $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/completions/zterm.bash $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/completions/zterm.fish $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/completions/_zterm $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/linux/Zterm.desktop $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./extra/zterm.info $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh ./zterm.yml $GITHUB_TOKEN
